name: CI

on:
  pull_request:
  push:

jobs:
  verify:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.0"
      - run: bun install --frozen-lockfile
      - run: bun lint
      - run: bun test:types
      - run: bun test
      - run: bun run build
      - run: bun test:pack
